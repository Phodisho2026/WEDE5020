<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Phodii's Flower Pod</title>
    <meta name="description" content="Browse our beautiful flower gallery at Phodii's Flower Pod. See our stunning bouquets and arrangements.">
    <meta name="keywords" content="flower gallery, flower arrangements, bouquets, South Africa, flowers">
    <meta name="author" content="Phodisho Mongwai">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="css_assets/mystyles.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .gallery-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 3px solid #F8BBD0;
        }
        
        .gallery-grid img:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(198, 40, 40, 0.2);
        }
        
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .lightbox.show {
            display: flex;
        }
        
        .lightbox img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            border: 4px solid #FFFFFF;
        }
        
        .lightbox .close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #FFFFFF;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .lightbox .close:hover {
            color: #F8BBD0;
            transform: scale(1.2);
        }
        
        .gallery-title {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .gallery-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        .gallery-grid img {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .gallery-grid img {
                height: 200px;
            }
        }
        
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            
            .gallery-grid img {
                height: 250px;
            }
            
            .lightbox img {
                max-width: 95%;
                max-height: 70%;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="products.html">Services</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="enquiries.html">Inquiry</a></li>
                <li><a href="contact_us.html">Contact us</a></li>
            </ul>
        </nav>
        <img src="images/PHODII-FLOWER-POD.jpg" alt="Phodii's Flower Pod Logo" height="150px">
    </header>

    <main>
        <h1 class="gallery-title">Our Flower Gallery</h1>
        <p class="gallery-subtitle">Click on any image to view it larger</p>

        <div class="gallery-grid">
            <!-- Make sure these images exist in your images folder! -->
            <img src="images/PHODII-FLOWER-POD.jpg" alt="Phodii's Flower Pod logo with pink flowers" onclick="openLightbox(this)">
            <img src="images/salah-darwish-0tsdTCEadTE-unsplash.jpg" alt="Romantic red roses bouquet with white wrapping" onclick="openLightbox(this)">
            <img src="images/slava-6-12MR02ru0-unsplash.jpg" alt="Bright pink and red kkkkkkkkkkkkkstulips in a glass vase" onclick="openLightbox(this)">
            <img src="images/uljana-borodina-NFj6pEUdmpY-unsplash.jpg" alt="Elegant white and purple orchids arrangement" onclick="openLightbox(this)">
            <img src="images/zoe-richardson-V_MV68oW3FE-unsplash.jpg" alt="Colorful spring daisies bouquet with mixed colors" onclick="openLightbox(this)">
            <img src="images/product.image4.jpg" alt="Mixed flower bouquet with roses and seasonal flowers" onclick="openLightbox(this)">
        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="Enlarged flower image">
    </div>

    <footer>
        <p>Phodisho Mongwai &copy; &trade;</p>
    </footer>

    <script>
        // Lightbox functions
        function openLightbox(img) {
            var lightbox = document.getElementById('lightbox');
            var lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = img.src;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            var lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = 'auto';
        }
        
        // Close with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>

</body>
</html>
